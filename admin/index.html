<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F5EBDD" />
    <title>Moufida Admin · Observability</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      * { box-sizing: border-box; }
      body {
        font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
        color: #2C1E17;
        background-color: #F5EBDD;
        background-image:
          radial-gradient(60rem 40rem at 85% -10%, rgba(201, 106, 45, 0.10), transparent 60%),
          radial-gradient(50rem 36rem at -5% 5%, rgba(111, 78, 55, 0.08), transparent 55%);
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      ::selection { background: rgba(201, 106, 45, 0.24); }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #CBBAA8;
        border-radius: 6px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: #B59C84; background-clip: content-box; }
      a:focus-visible, button:focus-visible, input:focus-visible {
        outline: 2px solid rgba(201, 106, 45, 0.55);
        outline-offset: 2px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
