# Moufida full local stack. `docker compose up` boots every backend service.
# The Tauri desktop frontend runs on the host (needs a display) -- see
# frontend/README; it is intentionally not containerised here.
name: moufida

x-axis-env: &axis-env
  OLLAMA_URL: ${OLLAMA_URL}
  REDIS_URL: ${REDIS_URL}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - qdrantdata:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ./models/ollama:/root/.ollama

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment:
      <<: *axis-env
      DATABASE_URL: ${DATABASE_URL}
    ports: ["8001:8001"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  rag:
    build:
      context: .
      dockerfile: rag/Dockerfile
    environment: {QDRANT_URL: "${QDRANT_URL}", OLLAMA_URL: "${OLLAMA_URL}"}
    ports: ["8300:8300"]
    volumes:
      - ./rag/knowledge-base:/srv/knowledge-base:ro
    depends_on: [qdrant, ollama]

  daemon:
    build:
      context: .
      dockerfile: daemon/Dockerfile
    environment:
      REDIS_URL: ${REDIS_URL}
      RAG_URL: http://rag:8300
    depends_on:
      redis: {condition: service_healthy}

  # --- Axis services (8101-8110) -------------------------------------------
  ideation-service:
    build: {context: ., dockerfile: services/ideation-service/Dockerfile}
    environment: *axis-env
    ports: ["8101:8101"]
  market-intelligence-service:
    build: {context: ., dockerfile: services/market-intelligence-service/Dockerfile}
    environment: *axis-env
    ports: ["8102:8102"]
  product-offering-service:
    build: {context: ., dockerfile: services/product-offering-service/Dockerfile}
    environment: *axis-env
    ports: ["8103:8103"]
  brand-innovation-service:
    build: {context: ., dockerfile: services/brand-innovation-service/Dockerfile}
    environment: *axis-env
    ports: ["8104:8104"]
  business-model-service:
    build: {context: ., dockerfile: services/business-model-service/Dockerfile}
    environment: *axis-env
    ports: ["8105:8105"]
  legal-compliance-service:
    build: {context: ., dockerfile: services/legal-compliance-service/Dockerfile}
    environment: *axis-env
    ports: ["8106:8106"]
  marketing-service:
    build: {context: ., dockerfile: services/marketing-service/Dockerfile}
    environment: *axis-env
    ports: ["8107:8107"]
  sales-service:
    build: {context: ., dockerfile: services/sales-service/Dockerfile}
    environment: *axis-env
    ports: ["8108:8108"]
  operations-service:
    build: {context: ., dockerfile: services/operations-service/Dockerfile}
    environment: *axis-env
    ports: ["8109:8109"]
  go-to-market-service:
    build: {context: ., dockerfile: services/go-to-market-service/Dockerfile}
    environment: *axis-env
    ports: ["8110:8110"]

volumes:
  pgdata:
  qdrantdata:
