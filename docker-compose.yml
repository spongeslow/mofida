# Moufida full local stack. `docker compose up` boots every backend service.
# The Tauri desktop frontend runs on the host (needs a display) -- see
# frontend/README; it is intentionally not containerised here.
#
# Ollama: by default services talk to an Ollama running on the HOST
# (host.docker.internal:11434). To instead run Ollama inside compose, start it
# with the profile:  `docker compose --profile bundled-ollama up -d`  and point
# OLLAMA_URL / OLLAMA_BASE_URL at http://ollama:11434.
name: moufida

x-axis-env: &axis-env
  OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  # --- Infrastructure --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Host port intentionally omitted — services connect via the compose network.
    # To access from the host: docker compose exec postgres psql -U $POSTGRES_USER
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # Host port intentionally omitted — services connect via the compose network.
    # To access from the host: docker compose exec redis redis-cli
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    # Host port intentionally omitted — services connect via the compose network.
    volumes:
      - qdrantdata:/qdrant/storage

  # --- Core backend ----------------------------------------------------------
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment:
      <<: *axis-env
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts: *host-gateway
    ports: ["8001:8001"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  rag:
    build:
      context: .
      dockerfile: rag/Dockerfile
    environment:
      QDRANT_URL: ${QDRANT_URL}
      OLLAMA_URL: ${OLLAMA_URL}
    ports: ["8300:8300"]
    volumes:
      - ./rag/knowledge-base:/srv/knowledge-base:ro
    depends_on: [qdrant]

  daemon:
    build:
      context: .
      dockerfile: daemon/Dockerfile
    environment:
      REDIS_URL: ${REDIS_URL}
      REDIS_METRICS_CHANNEL: ${REDIS_METRICS_CHANNEL}
      RAG_URL: ${RAG_URL}
    depends_on:
      redis: {condition: service_healthy}

  # --- Scoring engine (standalone HTTP API) ----------------------------------
  scoring-engine:
    build:
      context: .
      dockerfile: scoring-engine/Dockerfile
    ports: ["8200:8200"]
    # No external dependencies — pure scoring library with no datastores.

  # --- Frontend (Vite dev server — web layer only, opt-in) ------------------
  # NOT started by default — `docker compose up` only starts the backend.
  # For the desktop app, run `npm run tauri dev` on the host (see README).
  # To access the UI in a browser without Tauri:
  #   docker compose --profile web up frontend
  frontend:
    profiles: [web]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports: ["5174:5173"]
    volumes:
      # Mount source so Vite hot-reload works without rebuilding the image.
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro

  # --- Axis services (8101-8110) --------------------------------------------
  ideation-service:
    build: {context: ., dockerfile: services/ideation-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8101:8101"]
  market-intelligence-service:
    build: {context: ., dockerfile: services/market-intelligence-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8102:8102"]
  product-offering-service:
    build: {context: ., dockerfile: services/product-offering-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8103:8103"]
  brand-innovation-service:
    build: {context: ., dockerfile: services/brand-innovation-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8104:8104"]
  business-model-service:
    build: {context: ., dockerfile: services/business-model-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8105:8105"]
  legal-compliance-service:
    build: {context: ., dockerfile: services/legal-compliance-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8106:8106"]
  marketing-service:
    build: {context: ., dockerfile: services/marketing-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8107:8107"]
  sales-service:
    build: {context: ., dockerfile: services/sales-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8108:8108"]
  operations-service:
    build: {context: ., dockerfile: services/operations-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8109:8109"]
  go-to-market-service:
    build: {context: ., dockerfile: services/go-to-market-service/Dockerfile}
    environment: *axis-env
    extra_hosts: *host-gateway
    ports: ["8110:8110"]

volumes:
  pgdata:
  qdrantdata:
  ollama_models:
